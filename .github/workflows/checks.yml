name: Validation Checks
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  unit-tests:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/install-node

      - name: Install dependencies
        run: npm ci

      - name: Run Unit Tests
        run: npm run test-ci

      - name: Add coverage to job summary (with emojis)
        run: |
          emoji () {
            pct=$1
            if (( $(echo "$pct >= 90" | bc -l) )); then echo "🟢";
            elif (( $(echo "$pct >= 80" | bc -l) )); then echo "🟡";
            else echo "🔴"; fi
          }

          echo "## 🧪 Test Coverage" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Coverage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|----------|--------|" >> $GITHUB_STEP_SUMMARY

          jq -r '
            .total
            | [
                ["Lines", .lines.pct],
                ["Statements", .statements.pct],
                ["Functions", .functions.pct],
                ["Branches", .branches.pct]
              ]
            | .[]
            | "\(. [0]) \(. [1])"
          ' coverage/coverage-summary.json \
          | while read metric pct; do
              printf "| %s | %.1f%% | %s |\n" \
                "$metric" \
                "$pct" \
                "$(emoji "$pct")" \
                >> $GITHUB_STEP_SUMMARY
            done

      - name: Annotate PR with uncovered lines
        run: node nodescripts/coverage-pr-annotations.mts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  typing-and-linting:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/install-node

      - name: Install dependencies
        run: npm ci

      - name: Run Type Check
        run: npm run typescript

      - name: Run Linter
        run: npm run lint

      - name: Run Formatter
        run: npm run format

  bundle-check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/install-node

      - name: Install dependencies
        run: npm ci

      - name: Run react-native bundle
        run: npm run test:bundle

  documentation-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js environment
        uses: actions/setup-node@v4

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Run Copilot CLI
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          copilot -p "Review the git log for this repository and write a bullet point summary of all code changes that were made today, with links to the relevant commit on GitHub. Above the bullet list give a description (max 100 words) summarizing the changes made. Write the details to summary.md" --allow-tool='shell(git:*)' --allow-tool=write --no-ask-user
          cat summary.md >> "$GITHUB_STEP_SUMMARY"
