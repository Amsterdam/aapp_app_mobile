parameters:
  - name: platform
    type: string
    default: 'ios'

steps:
  - checkout: self
    path: './s/'
    fetchDepth: 1
    fetchTags: false
  - pwsh: New-Item -Path "$(Pipeline.Workspace)/s/aapp_app_ios-certificates" -ItemType "directory" -Force
    displayName: 'prepare checkout aapp_app_ios-certificates'
  - checkout: aapp_app_ios-certificates
    path: './t/'
    fetchDepth: 1
    fetchTags: false
  # Set up environment
  - template: ./install-node.yml
  - template: ./install-ruby.yml
  - script: gem install bundler:$(cat .bundler)
    displayName: 'Install bundler'
  - task: JavaToolInstaller@0
    displayName: 'Install Java SDK'
    inputs:
      versionSpec: '17'
      jdkArchitectureOption: 'x64'
      jdkSourceOption: 'PreInstalled'
    condition: eq('${{ parameters.platform }}', 'android')

  - script: npm run ci
    displayName: 'Install node dependencies'

  # Extract React Native version and set as variable
  - script: |
      echo "##vso[task.setvariable variable=REACT_NATIVE_VERSION]$(jq -r .dependencies[\"react-native\"] package.json)"
    displayName: 'Extract React Native version'

  # Version info
  - template: ./save-version-info.yml

  # Download and move secure files
  - template: ./copy-android-files.yml
    parameters:
      condition: eq('${{ parameters.platform }}', 'android')
  - template: ./copy-ios-files.yml
    parameters:
      condition: eq('${{ parameters.platform }}', 'ios')

  # Install Ccache
  - script: |
      brew install ccache
      echo "##vso[task.prependpath]/usr/local/opt/ccache/libexec"
    displayName: 'Install Ccache'

  # Set ccache compiler_check to content
  - script: |
      ccache --set-config=compiler_check=content
      ccache --set-config=max_size=20G
    displayName: 'Set ccache compiler_check to content'

  - task: Cache@2
    inputs:
      key: 'ccache | "$(Agent.OS)$(Agent.OSArchitecture)" | ${{ parameters.platform }} | "$(REACT_NATIVE_VERSION)" | **/package-lock.json'
      path: $(CCACHE_DIR)
      cacheHitVar: CCACHE_CACHE_RESTORED
      restoreKeys: |
        ccache | "$(Agent.OS)$(Agent.OSArchitecture)" | ${{ parameters.platform }} | "$(REACT_NATIVE_VERSION)"
    displayName: 'Cache ccache directory'

  - task: Cache@2
    inputs:
      key: 'pods | "$(Agent.OS)$(Agent.OSArchitecture)" | ${{ parameters.platform }} | "$(REACT_NATIVE_VERSION)" | **/package-lock.json | ios/Podfile'
      path: $(HOME)/Library/Caches/CocoaPods
      cacheHitVar: PODS_CACHE_RESTORED
      restoreKeys: |
        pods | "$(Agent.OS)$(Agent.OSArchitecture)" | ${{ parameters.platform }} | "$(REACT_NATIVE_VERSION)"
    displayName: 'Cache CocoaPods local cache directory'
    condition: eq('${{ parameters.platform }}', 'ios')

  - template: ./cache-gems.yml
    parameters:
      platform: ${{ parameters.platform }}

  - task: Cache@2
    inputs:
      key: 'gradle | "$(Agent.OS)$(Agent.OSArchitecture)" | ${{ parameters.platform }} | "$(REACT_NATIVE_VERSION)" | **/package-lock.json'
      path: $(Build.Repository.LocalPath)/android/build-cache
      cacheHitVar: GRADLE_CACHE_RESTORED
      restoreKeys: |
        gradle | "$(Agent.OS)$(Agent.OSArchitecture)" | ${{ parameters.platform }} | "$(REACT_NATIVE_VERSION)"
    displayName: 'Cache android build directory'
    condition: eq('${{ parameters.platform }}', 'android')

  # Cache the Gradle configuration-cache directory for Android builds
  - task: Cache@2
    inputs:
      key: 'gradle_configuration | "$(Agent.OS)$(Agent.OSArchitecture)" | ${{ parameters.platform }} | "$(REACT_NATIVE_VERSION)" | **/package-lock.json'
      path: $(Build.Repository.LocalPath)/android/.gradle/configuration-cache
      cacheHitVar: GRADLE_CONFIGURATION_CACHE_RESTORED
      restoreKeys: |
        gradle_configuration | "$(Agent.OS)$(Agent.OSArchitecture)" | ${{ parameters.platform }} | "$(REACT_NATIVE_VERSION)"
    displayName: 'Cache gradle configuration cache directory'
    condition: eq('${{ parameters.platform }}', 'android')

  # Cache Gradle wrapper distributions
  - task: Cache@2
    inputs:
      key: 'gradle_wrapper_cache | "$(Agent.OS)$(Agent.OSArchitecture)" | ${{ parameters.platform }} | "$(REACT_NATIVE_VERSION)" | android/gradle/wrapper/gradle-wrapper.properties | **/package-lock.json'
      path: $(GRADLE_USER_HOME)/wrapper
      cacheHitVar: GRADLE_WRAPPER_CACHE_RESTORED
      restoreKeys: |
        gradle_wrapper_cache | "$(Agent.OS)$(Agent.OSArchitecture)" | ${{ parameters.platform }} | "$(REACT_NATIVE_VERSION)"
    displayName: 'Cache Gradle wrapper distributions'
    condition: eq('${{ parameters.platform }}', 'android')

  # Cache Gradle dependency caches (Maven/Ivy + transforms). This is usually the biggest download saver.
  - task: Cache@2
    inputs:
      key: 'gradle_user_caches | "$(Agent.OS)$(Agent.OSArchitecture)" | ${{ parameters.platform }} | "$(REACT_NATIVE_VERSION)" | **/package-lock.json | android/build.gradle | android/settings.gradle'
      path: $(GRADLE_USER_HOME)/caches
      cacheHitVar: GRADLE_USER_CACHES_RESTORED
      restoreKeys: |
        gradle_user_caches | "$(Agent.OS)$(Agent.OSArchitecture)" | ${{ parameters.platform }} | "$(REACT_NATIVE_VERSION)"
    displayName: 'Cache Gradle dependency caches'
    condition: eq('${{ parameters.platform }}', 'android')

  # Install gems and run Fastlane
  - script: |
      bundle config set --local without 'iosAppBuildDependencies'
    condition: eq('${{ parameters.platform }}', 'android')
    displayName: 'Set Bundler to ignore iosAppBuildDependencies'
  - script: |
      bundle install
    displayName: 'Bundle install Ruby gems'
  - script: |
      bundle exec fastlane buildApps
    displayName: 'Build ${{ parameters.platform }}'
    workingDirectory: ${{ parameters.platform }}
    env:
      VERSION: $(VERSION)
      BUILD_NUMBER: $(BUILD_NUMBER)
      PIWIK_PRO_URL: $(PIWIK_PRO_URL)
      PIWIK_PRO_ID: $(PIWIK_PRO_ID)
      PIWIK_PRO_URL_ACCEPT: $(PIWIK_PRO_URL_ACCEPT)
      PIWIK_PRO_ID_ACCEPT: $(PIWIK_PRO_ID_ACCEPT)
      FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT: '180'
      FASTLANE_XCODE_LIST_TIMEOUT: '180'
      MATCH_GIT_BEARER_AUTHORIZATION: $(System.AccessToken)
      MATCH_PASSWORD: $(MATCH_PASSWORD)
      APPLICATION_INSIGHTS_INSTRUMENTATION_KEY_DEV: $(APPLICATION_INSIGHTS_INSTRUMENTATION_KEY_DEV)
      APPLICATION_INSIGHTS_INSTRUMENTATION_KEY_TEST: $(APPLICATION_INSIGHTS_INSTRUMENTATION_KEY_TEST)
      APPLICATION_INSIGHTS_INSTRUMENTATION_KEY_ACC: $(APPLICATION_INSIGHTS_INSTRUMENTATION_KEY_ACC)
      APPLICATION_INSIGHTS_INSTRUMENTATION_KEY_PROD: $(APPLICATION_INSIGHTS_INSTRUMENTATION_KEY_PROD)
      FILTER_API_KEY_DEV: $(API_KEY_DEV)
      FILTER_API_KEY_TEST: $(API_KEY_TEST)
      FILTER_API_KEY_ACC: $(API_KEY_ACC)
      FILTER_API_KEY_PROD: $(API_KEY_PROD)
      CHAT_DEVELOPER_NAME_DEV: $(CHAT_DEVELOPER_NAME_DEV)
      CHAT_DEVELOPER_NAME_TEST: $(CHAT_DEVELOPER_NAME_TEST)
      CHAT_DEVELOPER_NAME_ACC: $(CHAT_DEVELOPER_NAME_ACC)
      CHAT_DEVELOPER_NAME_PROD: $(CHAT_DEVELOPER_NAME_PROD)
      CHAT_ORGANIZATION_ID_DEV: $(CHAT_ORGANIZATION_ID_DEV)
      CHAT_ORGANIZATION_ID_TEST: $(CHAT_ORGANIZATION_ID_TEST)
      CHAT_ORGANIZATION_ID_ACC: $(CHAT_ORGANIZATION_ID_ACC)
      CHAT_ORGANIZATION_ID_PROD: $(CHAT_ORGANIZATION_ID_PROD)
      CHAT_URL_DEV: $(CHAT_URL_DEV)
      CHAT_URL_TEST: $(CHAT_URL_TEST)
      CHAT_URL_ACC: $(CHAT_URL_ACC)
      CHAT_URL_PROD: $(CHAT_URL_PROD)
      GOOGLE_MAPS_API_KEY_ANDROID: $(GOOGLE_MAPS_API_KEY_ANDROID)
      GOOGLE_MAPS_API_KEY_IOS: $(GOOGLE_MAPS_API_KEY_IOS)

  - script: |
      ccache -s # Show ccache stats
    displayName: 'Show ccache stats'

  # Handle artifacts
  - template: ./copy-generic-artifacts.yml
    parameters:
      platform: ${{ parameters.platform }}
  - template: ./copy-android-artifacts.yml
    parameters:
      condition: eq('${{ parameters.platform }}', 'android')
  - template: ./copy-ios-artifacts.yml
    parameters:
      condition: eq('${{ parameters.platform }}', 'ios')
  - task: PublishBuildArtifacts@1
    displayName: 'Publish artifacts'
    inputs:
      pathToPublish: $(Build.ArtifactStagingDirectory)
      artifactName: ${{ parameters.platform }}-build
