jobs:
  - job: 'Tests'
    timeoutInMinutes: 30
    pool:
      vmImage: macOS-26
    steps:
      - checkout: self
        path: './s/'
        fetchDepth: 1
        fetchTags: false
      - template: ./install-node.yml
      - script: npm run ci
        displayName: Install Dependencies
      - template: ./checks.yml
