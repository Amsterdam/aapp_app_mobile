trigger: none

pr: none

resources:
  pipelines:
    - pipeline: build # Name of the pipeline resource.
      source: 'aapp_app_mobile [build]' # The name of the pipeline referenced by this pipeline resource.
      trigger:
        branches:
          include:
            - main
            - hotfix/*

variables:
  - name: BUNDLE_PATH
    value: $(Pipeline.Workspace)/.bundle

stages:
  - stage: iOSInternal
    displayName: 'iOS Internal'
    jobs:
      - template: ./templates/distribution.yml
        parameters:
          platform: 'ios'
          environment: 'Internal'
          variant: 'test'
      - template: ./templates/distribution.yml
        parameters:
          platform: 'ios'
          environment: 'Internal'
          variant: 'prod'
  - stage: iOSStakeholders
    displayName: 'iOS Stakeholders'
    dependsOn: iOSInternal
    condition: not(or(failed(), canceled()))
    jobs:
      - template: ./templates/distribution.yml
        parameters:
          platform: 'ios'
          environment: 'Stakeholders'
          variant: 'test'
      - template: ./templates/distribution.yml
        parameters:
          platform: 'ios'
          environment: 'Stakeholders'
          variant: 'prod'
  - stage: iOSProduction
    displayName: 'iOS Production'
    dependsOn: iOSStakeholders
    condition: not(or(failed(), canceled()))
    jobs:
      - template: ./templates/distribution.yml
        parameters:
          platform: 'ios'
          environment: 'Production'
          variant: 'prod'
