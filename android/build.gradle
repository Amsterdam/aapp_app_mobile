buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 28
        compileSdkVersion = 36
        targetSdkVersion = 36
        enableHermes = true
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
        playServicesLocationVersion = "21.0.1"
        // Fix for geo-location crash in combination with react-native maps: https://stackoverflow.com/questions/77274148/could-not-invoke-rnfusedlocation-getcurrentposition-react-native-geolocation-s
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle'
        classpath 'com.facebook.react:react-native-gradle-plugin'
        classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin'
        // Firebase
        classpath 'com.google.gms:google-services:4.4.2'
        // NOTE: Do not place your application dependencies here; they belong in the individual module build.gradle files
        def rnrepoDir = new File(
            providers.exec {
                workingDir(rootDir)
                commandLine("node", "--print", "require.resolve('@rnrepo/build-tools/package.json')")
            }.standardOutput.asText.get().trim()
        ).getParentFile().absolutePath
        classpath fileTree(dir: "${rnrepoDir}/gradle-plugin/build/libs", include: ["prebuilds-plugin.jar"])
    }
}

allprojects {
    repositories {
        // Required by Notifee
        maven {
            url = "$rootDir/../node_modules/@notifee/react-native/android/libs"
        }

        maven {
            url = "https://s3.amazonaws.com/inapp.salesforce.com/public/android"
            content {
                includeGroupByRegex "com\\.salesforce.*"
            }
        }
        maven { url "https://packages.rnrepo.org/releases" }
    }
    afterEvaluate {
        if (it.hasProperty('android')) {
            android {
                defaultConfig {
                    minSdkVersion 24
                }
            }
        }
    }
}

apply plugin: "com.facebook.react.rootproject"
apply plugin: "expo-root-project"